<!DOCTYPE html>
<html>
<head>
    <title>Debug Panel Loading</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Modler V2 Panel Debug</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        async function debugPanels() {
            addResult('🔍 Starting panel debug...', 'info');

            // Test 1: Check if Svelte server is accessible
            try {
                const response = await fetch('http://localhost:5174/');
                if (response.ok) {
                    addResult('✅ Svelte server (5174) is accessible', 'success');
                } else {
                    addResult('❌ Svelte server returned error: ' + response.status, 'error');
                }
            } catch (error) {
                addResult('❌ Cannot reach Svelte server: ' + error.message, 'error');
            }

            // Test 2: Check individual panel routes
            const routes = ['/property-panel', '/left-panel', '/main-toolbar', '/system-toolbar'];
            for (const route of routes) {
                try {
                    const response = await fetch(`http://localhost:5174${route}`);
                    if (response.ok) {
                        addResult(`✅ Route ${route} is accessible`, 'success');
                    } else {
                        addResult(`❌ Route ${route} returned error: ${response.status}`, 'error');
                    }
                } catch (error) {
                    addResult(`❌ Cannot reach route ${route}: ${error.message}`, 'error');
                }
            }

            // Test 3: Check if panel manager classes are loaded
            if (window.SveltePortDetector) {
                addResult('✅ SveltePortDetector class is loaded', 'success');

                const detector = new window.SveltePortDetector();
                const detected = await detector.detectPort();
                if (detected) {
                    addResult('✅ Port detection successful: ' + detector.getBaseUrl(), 'success');
                } else {
                    addResult('❌ Port detection failed', 'error');
                }
            } else {
                addResult('❌ SveltePortDetector class not found', 'error');
            }

            if (window.SveltePanelManager) {
                addResult('✅ SveltePanelManager class is loaded', 'success');
            } else {
                addResult('❌ SveltePanelManager class not found', 'error');
            }

            // Test 4: Try to create panels manually
            if (window.SveltePortDetector && window.SveltePanelManager) {
                try {
                    const detector = new window.SveltePortDetector();
                    await detector.detectPort();

                    if (detector.isDetected()) {
                        const panelManager = new window.SveltePanelManager(detector);

                        addResult('🧪 Creating test panel...', 'warning');
                        panelManager.createRightOverlay();
                        panelManager.showPanels();
                        addResult('✅ Test panel created successfully', 'success');
                    } else {
                        addResult('❌ Cannot create panels - port not detected', 'error');
                    }
                } catch (error) {
                    addResult('❌ Error creating panels: ' + error.message, 'error');
                }
            }
        }

        debugPanels();
    </script>
</body>
</html>
