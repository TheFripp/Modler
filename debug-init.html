<!DOCTYPE html>
<html>
<head>
    <title>Debug Initialization</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .status { padding: 8px; margin: 5px 0; border-radius: 4px; }
        .success { background: #0f5132; color: #d1e7dd; }
        .error { background: #842029; color: #f8d7da; }
        .warning { background: #664d03; color: #fff3cd; }
        .info { background: #055160; color: #cff4fc; }
        button { padding: 10px 20px; margin: 5px; background: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Modler V2 Initialization Debug</h1>

    <div id="status"></div>
    <button onclick="runDiagnostic()">Run Full Diagnostic</button>

    <!-- Add canvas element for testing -->
    <canvas id="canvas" width="400" height="300" style="border: 1px solid #666; margin-top: 10px;"></canvas>

    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            document.getElementById('status').appendChild(div);
            console.log(message);
        }

        function runDiagnostic() {
            document.getElementById('status').innerHTML = '';

            log('Starting diagnostic...', 'info');

            // Check basic globals
            log(`window exists: ${typeof window !== 'undefined'}`, 'info');
            log(`document exists: ${typeof document !== 'undefined'}`, 'info');

            // Check if Three.js loaded
            log(`THREE loaded: ${typeof window.THREE !== 'undefined'}`, window.THREE ? 'success' : 'error');

            // Check modlerComponents
            log(`window.modlerComponents exists: ${typeof window.modlerComponents !== 'undefined'}`,
                window.modlerComponents ? 'success' : 'error');

            if (window.modlerComponents) {
                const keys = Object.keys(window.modlerComponents);
                log(`modlerComponents keys: ${keys.length} - [${keys.join(', ')}]`, 'info');
            }

            // Check for specific classes
            const classes = [
                'SceneFoundation', 'SceneController', 'SelectionController',
                'ObjectStateManager', 'InputController', 'ToolController'
            ];

            classes.forEach(className => {
                const exists = typeof window[className] !== 'undefined';
                log(`${className} class available: ${exists}`, exists ? 'success' : 'warning');
            });

            // Check canvas
            const canvas = document.getElementById('canvas');
            log(`Canvas element exists: ${canvas !== null}`, canvas ? 'success' : 'error');

            // Check if v2-main.js functions exist
            const functions = ['initializeModlerV2', 'getModlerV2Status'];
            functions.forEach(funcName => {
                const exists = typeof window[funcName] === 'function';
                log(`${funcName} function available: ${exists}`, exists ? 'success' : 'warning');
            });

            // Try to manually initialize if function exists
            if (typeof window.initializeModlerV2 === 'function') {
                log('Attempting manual initialization...', 'warning');
                try {
                    window.initializeModlerV2();
                    log('Manual initialization completed', 'success');
                } catch (error) {
                    log(`Manual initialization failed: ${error.message}`, 'error');
                }
            }

            log('Diagnostic complete. Check browser console for additional errors.', 'info');
        }

        // Auto-run diagnostic after page loads
        window.addEventListener('load', () => {
            setTimeout(runDiagnostic, 1000);
        });

        // Capture and log any JavaScript errors
        window.addEventListener('error', (event) => {
            log(`JavaScript Error: ${event.message} at ${event.filename}:${event.lineno}`, 'error');
        });
    </script>

    <!-- Load Three.js and essential scripts for accurate testing -->
    <script src="vendor/three.min.js"></script>
    <script src="foundation/scene-foundation.js"></script>
    <script src="scene/scene-controller.js"></script>
    <script src="interaction/support-mesh-factory.js"></script>
    <script src="application/utilities/geometry-factory.js"></script>
    <script src="application/utilities/material-manager.js"></script>
    <script src="core/object-state-manager.js"></script>
    <script src="interaction/selection-controller.js"></script>
    <script src="interaction/input-controller.js"></script>
    <script src="application/tool-controller.js"></script>
    <script src="v2-main.js"></script>
</body>
</html>
