<!DOCTYPE html>
<html>
<head>
    <title>Communication Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .test-result { padding: 10px; margin: 5px 0; border-radius: 4px; }
        .success { background: #0f5132; color: #d1e7dd; }
        .error { background: #842029; color: #f8d7da; }
        .info { background: #055160; color: #cff4fc; }
        button { padding: 10px 20px; margin: 5px; background: #0d6efd; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>3D Scene ↔ Svelte Panel Communication Test</h1>

    <div id="test-results"></div>

    <button onclick="testSvelteServerDetection()">Test Svelte Server Detection</button>
    <button onclick="testPanelCreation()">Test Panel Creation</button>
    <button onclick="testMessageFlow()">Test Message Flow</button>
    <button onclick="runFullTest()">Run Full Test</button>

    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            document.getElementById('test-results').appendChild(div);
            console.log(message);
        }

        function clear() {
            document.getElementById('test-results').innerHTML = '';
        }

        async function testSvelteServerDetection() {
            clear();
            log('Testing Svelte server detection...', 'info');

            // Test if we can detect Svelte server on expected ports
            const ports = [5173, 5174, 5175, 5176, 5177];
            let foundPort = null;

            for (const port of ports) {
                try {
                    const response = await fetch(`http://localhost:${port}/`, {
                        method: 'GET',
                        mode: 'no-cors' // Allow cross-origin for testing
                    });
                    log(`✅ Svelte server found on port ${port}`, 'success');
                    foundPort = port;
                    break;
                } catch (error) {
                    log(`❌ Port ${port} not accessible: ${error.message}`, 'error');
                }
            }

            if (!foundPort) {
                log('❌ No Svelte server found on any port', 'error');
            }

            return foundPort;
        }

        async function testPanelCreation() {
            clear();
            log('Testing panel creation system...', 'info');

            // Check if Svelte classes are available
            if (typeof window.SveltePortDetector === 'undefined') {
                log('❌ SveltePortDetector class not available', 'error');
                return false;
            }
            log('✅ SveltePortDetector class available', 'success');

            if (typeof window.SveltePanelManager === 'undefined') {
                log('❌ SveltePanelManager class not available', 'error');
                return false;
            }
            log('✅ SveltePanelManager class available', 'success');

            // Test port detection
            const detector = new window.SveltePortDetector();
            const detected = await detector.detectPort();

            if (detected) {
                log(`✅ Port detection successful: ${detector.getBaseUrl()}`, 'success');

                // Test panel manager creation
                const panelManager = new window.SveltePanelManager(detector);
                log('✅ Panel manager created successfully', 'success');

                return true;
            } else {
                log('❌ Port detection failed', 'error');
                return false;
            }
        }

        async function testMessageFlow() {
            clear();
            log('Testing message flow system...', 'info');

            // Initialize components first if not available
            if (!window.modlerComponents) {
                log('⚠️ modlerComponents not available, initializing...', 'info');

                // Create a canvas element for initialization
                const canvas = document.createElement('canvas');
                canvas.id = 'test-canvas';
                canvas.width = 400;
                canvas.height = 300;
                canvas.style.display = 'none';
                document.body.appendChild(canvas);

                try {
                    // Initialize the V2 system
                    if (typeof window.initializeModlerV2 === 'function') {
                        await window.initializeModlerV2(canvas);
                        log('✅ modlerComponents initialized successfully', 'success');
                    } else {
                        log('❌ initializeModlerV2 function not available', 'error');
                        return false;
                    }
                } catch (error) {
                    log(`❌ Initialization failed: ${error.message}`, 'error');
                    return false;
                }
            } else {
                log('✅ modlerComponents available', 'success');
            }

            const { objectStateManager, sceneController, selectionController } = window.modlerComponents;

            if (!objectStateManager) {
                log('❌ ObjectStateManager not available', 'error');
                return false;
            }
            log('✅ ObjectStateManager available', 'success');

            if (!sceneController) {
                log('❌ SceneController not available', 'error');
                return false;
            }
            log('✅ SceneController available', 'success');

            if (!selectionController) {
                log('❌ SelectionController not available', 'error');
                return false;
            }
            log('✅ SelectionController available', 'success');

            // Test event listener setup
            try {
                objectStateManager.addEventListener('selection-changed', (event) => {
                    log(`📤 Selection changed event received: ${JSON.stringify(event.detail)}`, 'info');
                });
                log('✅ Event listener setup successful', 'success');
            } catch (error) {
                log(`❌ Event listener setup failed: ${error.message}`, 'error');
                return false;
            }

            return true;
        }

        async function runFullTest() {
            clear();
            log('🚀 Running full communication test...', 'info');

            // Test 1: Svelte server detection
            const serverDetected = await testSvelteServerDetection();
            if (!serverDetected) {
                log('❌ Full test failed at server detection', 'error');
                return;
            }

            await new Promise(resolve => setTimeout(resolve, 1000));

            // Test 2: Panel creation
            const panelCreated = await testPanelCreation();
            if (!panelCreated) {
                log('❌ Full test failed at panel creation', 'error');
                return;
            }

            await new Promise(resolve => setTimeout(resolve, 1000));

            // Test 3: Message flow
            const messageFlow = testMessageFlow();
            if (!messageFlow) {
                log('❌ Full test failed at message flow', 'error');
                return;
            }

            log('🎉 Full communication test completed successfully!', 'success');
            log('💡 Try selecting objects in the main app to test real communication', 'info');
        }

        // Auto-run basic test after page loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('🔧 Communication test page loaded', 'info');
                log('Click buttons above to test different aspects of the communication system', 'info');
            }, 500);
        });
    </script>
