            <!-- Svelte property panel will be mounted here directly -->

    <!-- Legacy V1 UI scripts removed - replaced by Svelte UI -->

    <!-- Parametric Property System: Deferred loading (see bottom of file) -->

    <!-- Svelte UI Main Integration (Load AFTER v2-main.js) -->
    <script src="integration/svelte/panel-communication.js"></script>
    <script src="integration/svelte/settings-handler.js"></script>
    <script src="integration/svelte/main-integration.js"></script>

    <!-- Performance Optimization: Deferred loading for non-critical systems -->
    <script>
        // Load parametric system after initial render (rarely used, can be deferred)
        window.addEventListener('load', () => {
            // Check if parametric is needed (future: load on first use)
            // For now, load after page is fully loaded
            const parametricScripts = [
                'application/parametric/formula-evaluator.js',
                'application/parametric/dependency-graph.js',
                'application/parametric/constraint-solver.js',
                'application/schemas/property-schema-registry.js'
            ];

            parametricScripts.forEach((src) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                document.body.appendChild(script);
            });
        });
    </script>
