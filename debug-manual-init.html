<!DOCTYPE html>
<html>
<head>
    <title>Manual Init Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .error { background: #842029; color: #f8d7da; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #0f5132; color: #d1e7dd; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .info { background: #055160; color: #cff4fc; padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Manual Initialization Test</h1>
    <div id="output"></div>
    <canvas id="canvas" width="800" height="600" style="border: 1px solid #666;"></canvas>

    <!-- Load Three.js first -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Wait for Three.js, then load foundation -->
    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            document.getElementById('output').appendChild(div);
            console.log(message);
        }

        // Override console.error to catch all errors
        const originalError = console.error;
        console.error = function(...args) {
            log('CONSOLE ERROR: ' + args.join(' '), 'error');
            originalError.apply(console, args);
        };

        // Catch all JavaScript errors
        window.addEventListener('error', (event) => {
            log(`JS ERROR: ${event.message} at ${event.filename}:${event.lineno}`, 'error');
        });

        window.addEventListener('unhandledrejection', (event) => {
            log(`PROMISE REJECTION: ${event.reason}`, 'error');
        });

        // Wait for Three.js to load, then manually load and test scripts
        function waitForThreeJS() {
            if (typeof THREE !== 'undefined') {
                log('THREE.js loaded successfully', 'success');
                log(`THREE.js version: ${THREE.REVISION}`, 'info');
                loadFoundationScripts();
            } else {
                log('Waiting for THREE.js...', 'info');
                setTimeout(waitForThreeJS, 100);
            }
        }

        async function loadFoundationScripts() {
            const scripts = [
                'foundation/scene-foundation.js',
                'scene/scene-controller.js',
                'core/object-state-manager.js',
                'interaction/selection-controller.js',
                'v2-main.js'
            ];

            for (const scriptPath of scripts) {
                try {
                    log(`Loading ${scriptPath}...`, 'info');
                    await loadScript(scriptPath);
                    log(`✅ ${scriptPath} loaded`, 'success');
                } catch (error) {
                    log(`❌ ${scriptPath} failed: ${error.message}`, 'error');
                    return; // Stop on first error
                }
            }

            // Try manual initialization
            log('Scripts loaded, attempting manual initialization...', 'info');
            await attemptManualInit();
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Failed to load ${src}`));
                document.head.appendChild(script);
            });
        }

        async function attemptManualInit() {
            const canvas = document.getElementById('canvas');
            if (!canvas) {
                log('❌ Canvas not found', 'error');
                return;
            }

            // Check if classes exist
            const classes = ['SceneFoundation', 'SceneController', 'ObjectStateManager', 'SelectionController'];
            for (const className of classes) {
                if (typeof window[className] === 'undefined') {
                    log(`❌ Class ${className} not found`, 'error');
                    return;
                }
            }
            log('✅ All required classes found', 'success');

            // Check if initializeModlerV2 exists
            if (typeof window.initializeModlerV2 !== 'function') {
                log('❌ initializeModlerV2 function not found', 'error');
                return;
            }

            try {
                log('🚀 Calling initializeModlerV2...', 'info');
                await window.initializeModlerV2(canvas);
                log('✅ initializeModlerV2 completed', 'success');

                // Check if components were created
                if (window.modlerComponents) {
                    const keys = Object.keys(window.modlerComponents);
                    log(`✅ modlerComponents created with ${keys.length} components: ${keys.join(', ')}`, 'success');
                } else {
                    log('❌ modlerComponents not created', 'error');
                }

            } catch (error) {
                log(`❌ initializeModlerV2 failed: ${error.message}`, 'error');
                log(`Stack trace: ${error.stack}`, 'error');
            }
        }

        // Start the process
        waitForThreeJS();
    </script>
</body>
</html>
